<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <title>{{ title }}</title>
    {%block head%}{%endblock%}
</head>
<body>
    <header>
    <nav class="navbar navbar-light bg-light">
        <a class="navbar-brand" href="/" style="margin-left: 15px">Сайт про семейные походы</a>
        <a class="btn btn-success" href="/photogalery">Фотогалерея</a>
        <div class="d-flex align-items-center">
                {% if current_user.is_authenticated %}
                    {% if current_user.role=="root" %}
                    <a class="btn btn-primary" href="/register">Регистрация</a>
                    {% endif %}
                <a class="navbar-brand" href="/logout">{{ current_user.nickname }} (Выйти)</a>

            {% else %}
                <div style="margin-right: 20px;">
                    <!-- {% if current_user.is_authenticated %}
                        <a class="btn btn-primary" href="/register">Регистрация</a>
                    {% endif %} -->
                    <a class="btn btn-success" href="/login">Войти</a>
                </div>
            {% endif %}
        </div>
    </nav>
    </header>
    <main role="main" class="container">
        {% block content %}{% endblock %}
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
