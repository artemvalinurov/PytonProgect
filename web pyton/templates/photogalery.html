{% extends "base.html" %}

{% block content %}
<div class="row row-cols-1 row-cols-md-3 g-4 mt-2">
    {% for mem in mems %}
    <div class="col">
        <div class="card h-100">
            <img src="{{ url_for('static', filename='uploads/' + mem.image) }}" alt="{{ mem.title }}" class="card-img-top">
            <div class="card-body">
                <!-- <h5 class="card-title">{{ mem.title }}</h5> -->
                <p class="card-text">{{ mem.description }}</p>
            </div>
            <div class="card-footer text-muted">
                <small>{{ mem.user.nickname }} | {{ mem.created.strftime('%d.%m.%Y %H:%M') }}</small>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% if current_user.is_authenticated %}
    <a class="btn btn-warning" href="/add" style="position: fixed; bottom: 30px; right: 30px; z-index: 1000;">Добавить фото</a>
{% endif %}
{% endblock %}
